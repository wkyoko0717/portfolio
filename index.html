<script>
// セクション切り替えの関数
function showSection(sectionId) {
    // 全てのセクション（TOPも含む）を一旦隠す
    document.querySelectorAll('.content-section, .top-section').forEach(sec => {
        sec.style.display = 'none';
    });
    
    // 指定されたIDのセクションだけを表示する
    const target = document.getElementById(sectionId);
    if (target) {
        // TOPセクションだけは flex、それ以外は block で表示
        target.style.display = (sectionId === 'top') ? 'flex' : 'block';
        window.scrollTo(0, 0);
    }
}

// 型紙から中身を流し込む魔法
function setupContent() {
    // 1. 履歴書
    const resumeTmpl = document.getElementById('resume-template').content;
    document.getElementById('resume').appendChild(resumeTmpl.cloneNode(true));

    // 2. Direction（これを追加！）
    const dirTmpl = document.getElementById('works-direction-template').content;
    document.getElementById('works-direction').appendChild(dirTmpl.cloneNode(true));

const webTmpl = document.getElementById('works-web-template').content;
    document.getElementById('works-web').appendChild(webTmpl.cloneNode(true));

    // 3. CONTACT
    const contactTmpl = document.getElementById('contact-template').content;
    document.getElementById('contact').appendChild(contactTmpl.cloneNode(true));

    // ※ Web, Video, Writingの型紙も作ったら、同じようにここに書き足していけばOKやで！

const videoTmpl = document.getElementById('works-video-template').content;
document.getElementById('works-video').appendChild(videoTmpl.cloneNode(true));

const writingTmpl = document.getElementById('works-writing-template').content;
    document.getElementById('works-writing').appendChild(writingTmpl.cloneNode(true));
}

// リンククリック時の制御（アップデート版）
document.addEventListener('click', (e) => {
    const link = e.target.closest('a[href^="#"]');
    if (link) {
        e.preventDefault();
        const id = link.hash.replace('#', '');
        showSection(id);
        
        // 1. 全てのメニューの色を一旦リセット
        document.querySelectorAll('.menu-list a').forEach(a => a.classList.remove('active'));
        
        // 2. クリックされたメニューを緑にする
        link.classList.add('active');

        // 3. ★もしクリックされたのが WORKS の子メニューなら、親の WORKS も緑にする
        const isSubMenu = link.closest('.sub-menu');
        if (isSubMenu) {
            document.getElementById('works-parent').classList.add('active');
        }
    }
});

// ページ読み込み時の処理
window.onload = () => {
    setupContent(); // 型紙から中身を準備
    showSection('top'); // 最初はTOPを表示
    
    // 自己PRのふわっと出るアニメーションの設定
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('is-visible');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-in-title').forEach(title => {
        observer.observe(title);
    });
};
</script>
