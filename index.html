<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kyoko Momose | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #222;
            --line-color: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            font-family: 'Montserrat', 'Shippori Mincho', serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .frame-box {
            position: relative;
            width: 80vw; height: 70vh;
            border: 1px solid var(--line-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            animation: frameIn 2s ease-out forwards;
        }

        @keyframes frameIn {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-family: 'Shippori Mincho', serif;
            font-size: 2.2rem; letter-spacing: 0.3em;
            margin-bottom: 60px;
            animation: textBlur 2s ease-out;
            color: var(--text-main);
        }

        @keyframes textBlur {
            from { filter: blur(10px); opacity: 0; }
            to { filter: blur(0); opacity: 1; }
        }

        .nav-container {
            position: relative;
            display: flex;
            gap: 20px;
        }

        .nav-item {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            padding: 15px 0;
            width: 150px;
            text-align: center;
            position: relative;
            z-index: 10;
            border: 1px solid var(--text-main);
            transition: color 0.3s;
            box-sizing: border-box; /* 🌸 これが大事！枠線を含めた計算にする設定 */
        }

        .nav-slider {
            position: absolute;
            /* 🌸 ズレを補正するために、枠線1px分外側まで広げる設定 */
            top: -1px; 
            left: -1px;
            width: 152px; /* 150px + 左右の枠線1pxずつ */
            height: calc(100% + 2px); /* 上下の枠線1pxずつ */
            background-color: var(--text-main);
            z-index: 5;
            transition: all 0.4s cubic-bezier(0.65, 0, 0.35, 1);
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
        }

        /* 🌸 移動距離も「ボタン幅150px + 隙間20px」でピタッと合うように再計算 */
        .nav-container:has(.nav-item:nth-of-type(1):hover) .nav-slider {
            opacity: 1; 
            transform: translateX(0);
        }
        .nav-container:has(.nav-item:nth-of-type(2):hover) .nav-slider {
            opacity: 1; 
            transform: translateX(170px); 
        }

        .nav-item:hover {
            color: #ffffff;
        }

        .corner { position: absolute; width: 20px; height: 20px; border: 1px solid var(--text-main); }
        .top-left { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .bottom-right { bottom: -1px; right: -1px; border-left: none; border-top: none; }
    </style>
</head>
<body>

    <div class="frame-box">
        <div class="corner top-left"></div>
        <div class="corner bottom-right"></div>

        <h1>百瀬  響子</h1>

        <div class="nav-container">
            <div class="nav-slider"></div>
            <a href="resume.html" class="nav-item">RESUME</a>
            <a href="#" class="nav-item">WORKS</a>
        </div>
    </div>

</body>
</html>
